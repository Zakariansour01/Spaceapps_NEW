<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="src/style.css" />
  <link rel="icon" type="image/png" href="Textures/Images/profile.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
  <title>3D Experience</title>



  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

    body {
      margin: 0;
      overflow: hidden;
    }

    #impact-report {
      position: absolute;
      top: 20px;
      right: 20px;
      background: linear-gradient(135deg, rgba(20, 20, 40, 0.95), rgba(40, 10, 10, 0.95));
      color: #fff;
      padding: 0;
      font-family: 'Orbitron', monospace;
      max-width: 380px;
      border-radius: 12px;
      display: none;
      z-index: 100;
      box-shadow: 0 8px 32px rgba(255, 0, 0, 0.3), 0 0 60px rgba(255, 50, 50, 0.2);
      border: 2px solid rgba(255, 50, 50, 0.5);
      animation: slideIn 0.5s ease-out, pulse 2s ease-in-out infinite;
    }

    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }

      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @keyframes pulse {

      0%,
      100% {
        box-shadow: 0 8px 32px rgba(255, 0, 0, 0.3), 0 0 60px rgba(255, 50, 50, 0.2);
      }

      50% {
        box-shadow: 0 8px 32px rgba(255, 0, 0, 0.5), 0 0 80px rgba(255, 50, 50, 0.4);
      }
    }

    #impact-report h2 {
      margin: 0;
      padding: 20px;
      font-size: 20px;
      font-weight: 900;
      text-align: center;
      background: linear-gradient(90deg, #ff0000, #ff6600, #ff0000);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 3s ease infinite;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
      border-bottom: 2px solid rgba(255, 50, 50, 0.5);
    }

    @keyframes gradientShift {

      0%,
      100% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }
    }

    #impact-report .content {
      padding: 20px;
    }

    #impact-report p {
      margin: 8px 0;
      font-size: 13px;
      line-height: 1.6;
    }

    #impact-report strong {
      color: #ffaa00;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 1px;
    }

    #impact-report span {
      color: #00ffff;
      font-weight: 400;
      font-size: 14px;
      text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
    }

    #impact-report hr {
      border: none;
      border-top: 1px solid rgba(255, 50, 50, 0.3);
      margin: 15px 0;
    }

    #impact-report .section {
      background: rgba(0, 0, 0, 0.3);
      padding: 12px;
      border-radius: 6px;
      margin: 10px 0;
      border-left: 3px solid #ff3333;
    }

    #impact-report .warning-icon {
      display: inline-block;
      color: #ff0000;
      font-size: 24px;
      animation: blink 1s ease-in-out infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }
  </style>
</head>
<div id="impact-report">
  <h2><span class="warning-icon">⚠</span> ASTEROID IMPACT REPORT <span class="warning-icon">⚠</span></h2>
  <div class="content">
    <div class="section">
      <p><strong>Object Name:</strong> <span id="report-name"></span></p>
    </div>

    <div class="section">
      <p><strong>Impact Coordinates:</strong></p>
      <p>Latitude: <span id="report-lat"></span></p>
      <p>Longitude: <span id="report-lon"></span></p>
    </div>

    <div class="section">
      <p><strong>Asteroid Mass:</strong> <span id="report-mass"></span></p>
      <p><strong>Impact Velocity:</strong> <span id="report-velocity"></span></p>
    </div>

    <div class="section">
      <p><strong>Kinetic Energy:</strong></p>
      <p>Joules: <span id="report-ke-j"></span></p>
      <p>TNT Equivalent: <span id="report-ke-mt"></span></p>
    </div>

    <div class="section">
      <p><strong>Crater Diameter:</strong> <span id="report-crater-km"></span></p>
    </div>
  </div>
</div>

<body>


  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';



    // Add these lines near the beginning of your script, e.g., after the other global lets/consts

    let reportPanel;
    let reportElements = {};

    document.addEventListener('DOMContentLoaded', () => {
      // ... existing parameter reading code ...

      // --- NEW: Get report panel references ---
      reportPanel = document.getElementById('impact-report');
      reportElements = {
        name: document.getElementById('report-name'),
        lat: document.getElementById('report-lat'),
        lon: document.getElementById('report-lon'),
        mass: document.getElementById('report-mass'),
        velocity: document.getElementById('report-velocity'),
        keJ: document.getElementById('report-ke-j'),
        keMt: document.getElementById('report-ke-mt'),
        craterKm: document.getElementById('report-crater-km')
      };
      // ----------------------------------------

      // Initialize the simulation with the updated variables
      // NOTE: The call to initAsteroidSimulation is now correctly handled inside the DOMContentLoaded block 
      // where the parameter reading now resides, so the extra call here is removed.

      // Start the animation loop after initialization
      // animate(); // This is also moved into the parameter reading block
    });
    // --- Setup Scene, Camera, Renderer ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.00001, 100000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 100KM = 1 
    const FACTOR = 0.0001;
    const earthRaduis = 6731 * FACTOR;
    const Speed_Factor = 200;
    const Inner = 100 * FACTOR;
    const Outer = 600 * FACTOR;
    const Earth_Revolving = 1670 * FACTOR;
    // NEW: Camera follow distance in simulation units
    const CAMERA_FOLLOW_DISTANCE = 0.2;

    // Earth rotation speed multiplier
    let earthSpinMultiplier = 1;

    // --- Lighting ---
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambientLight);

    const hemiLight = new THREE.HemisphereLight(0x4488ff, 0x002244, 1.2);
    hemiLight.position.set(0, 10, 0);
    scene.add(hemiLight);

    // Sunlight (Directional Light)
    const SUN_POSITION = new THREE.Vector3(50, 0, 50);
    const sunLight = new THREE.DirectionalLight(0xffffff, 4);
    sunLight.position.copy(SUN_POSITION);
    const earthTarget = new THREE.Object3D();
    earthTarget.position.set(0, 0, 0);
    scene.add(earthTarget);
    sunLight.target = earthTarget;
    scene.add(sunLight);

    // --- Geometries ---
    const geometry = new THREE.SphereGeometry(earthRaduis, 64, 64);
    const geometry_Atom1 = new THREE.SphereGeometry(earthRaduis + Inner, 64, 64);
    const geometry_Atom2 = new THREE.SphereGeometry(earthRaduis + Outer, 64, 64);
    // REMOVED: const Asteroid1 = new THREE.SphereGeometry(0.05, 64, 64); // This will be created dynamically in initAsteroidSimulation

    // Sun Geometry
    const sunRadius = 0.5;
    const geometry_Sun = new THREE.SphereGeometry(sunRadius, 64, 64);

    const textureLoader = new THREE.TextureLoader();
    const earthTexture = textureLoader.load('Textures/earth.jpg');

    // Materials
    const material = new THREE.MeshStandardMaterial({
      map: earthTexture,
      roughness: 0.8,
      metalness: 0.0
    });

    const material_atom = new THREE.MeshStandardMaterial({
      transparent: true,
      opacity: 0.2,
      color: 'white'
    });
    const material_Aster = new THREE.MeshStandardMaterial({
      color: 'white'
    });

    // Sun Material (MeshBasicMaterial for self-illumination)
    const material_Sun = new THREE.MeshBasicMaterial({
      color: 0xffcc44
    });

    // Create meshes
    const earth = new THREE.Mesh(geometry, material);
    const Atom1 = new THREE.Mesh(geometry_Atom1, material_atom);
    const Atom2 = new THREE.Mesh(geometry_Atom2, material_atom);

    // CHANGED: AsteroidMesh needs to be 'let' and initialized later
    let AsteroidMesh; // Placeholder, will be defined in initAsteroidSimulation

    const sun = new THREE.Mesh(geometry_Sun, material_Sun);

    // Set Sun position and add sun mesh
    sun.position.copy(SUN_POSITION);
    scene.add(sun);

    // --- SUN TO EARTH LINE ---
    const sunEarthLineMaterial = new THREE.LineBasicMaterial({
      color: 0xffa500,
      linewidth: 1
    });

    const sunEarthLineGeometry = new THREE.BufferGeometry().setFromPoints([
      SUN_POSITION,
      new THREE.Vector3(0, 0, 0)
    ]);
    const sunEarthLine = new THREE.Line(sunEarthLineGeometry, sunEarthLineMaterial);
    scene.add(sunEarthLine);

    // --- REAL-TIME EARTH ROTATION SETUP ---

    // Convert a JS Date (UTC) to an Earth rotation angle using GMST (approx)
    function getEarthRotationAngle(date) {
      // Convert UTC → Julian Date
      const JD = date.getTime() / 86400000 + 2440587.5;
      const d = JD - 2451545.0; // days since J2000.0 epoch

      // Greenwich Mean Sidereal Time (degrees)
      let GMST = 280.46061837 + 360.98564736629 * d;
      GMST = (GMST % 360 + 360) % 360; // normalize 0–360

      return THREE.MathUtils.degToRad(GMST);
    }

    function updateEarthRotation() {
      const now = new Date();
      const rotationAngle = getEarthRotationAngle(now);

      // Apply the speed multiplier
      const TEXTURE_OFFSET = Math.PI * 0.5;
      earth.rotation.y = rotationAngle * earthSpinMultiplier + TEXTURE_OFFSET;
    }

    // --- NEW ASTEROID/LASER DATA VARIABLES (Dynamic) ---
    // Changed from const to let and given defaults
    let TARGET_LONGITUDE = 4.569; // Degrees (Default)
    let TARGET_LATITUDE = 0.015;  // Degrees (Default)
    let ASTEROID_IMPACT_SPEED_KM_S = 20.0; // Default speed from RealSim.js in km/s
    let ASTEROID_RADIUS_KM = 0.5 // Default radius in km (0.5 km is 500 meters)

    let ASTEROID_VISUAL_SPEED = 0.5; // Base speed multiplier for animation step
    let ASTEROID_NAME = "Incoming Object"; // Default Name
    const ASTEROID_DISTANCE = 5.0; // Initial distance from Earth surface

    // These will store the setup geometry/meshes. Declared globally.
    let targetPointLocal, laserDirectionLocal, laserOriginLocal, earthLaserLine, asteroidGroup;
    let currentDistance;
    let craterCenter;
    let hasCollided = false;
    // --- END NEW ASTEROID/LASER DATA VARIABLES ---

    // Fixed crater function – craterCenter must be in same units as geometry vertices
    function addCrater(geometry, craterCenter, craterRadius, depth) {
      const position = geometry.attributes.position;
      for (let i = 0; i < position.count; i++) {
        const x = position.getX(i);
        const y = position.getY(i);
        const z = position.getZ(i);

        const vertex = new THREE.Vector3(x, y, z);

        const dist = vertex.distanceTo(craterCenter);

        if (dist < craterRadius) {
          const falloff = 1 - dist / craterRadius;
          const inward = depth * falloff;

          const dir = vertex.clone().normalize();
          position.setXYZ(
            i,
            x - inward * dir.x,
            y - inward * dir.y,
            z - inward * dir.z
          );
        }
      }
      position.needsUpdate = true;
      geometry.computeVertexNormals();
    }

    // Create a group to handle the tilt (tilt the whole group, rotate the planet inside)
    const earthGroup = new THREE.Group();
    earthGroup.add(earth);
    earthGroup.add(Atom1);

    // Apply the 23.5° tilt to the entire group
    earthGroup.rotation.z = THREE.MathUtils.degToRad(23.5);

    scene.add(earthGroup);

    // Camera position
    camera.position.z = 1;
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const clock = new THREE.Clock();

    // UI Controls for Earth spin speed (omitted for brevity, assume they are still here)

    // --- NEW FUNCTION TO INITIALIZE ASTEROID AND LASER ---
    function initAsteroidSimulation() {
      // 1. Calculate the initial target point on the Earth's surface (Cartesian)
      targetPointLocal = new THREE.Vector3();
      const radius = earthRaduis;

      // Convert Longitude/Latitude to Cartesian coordinates (Local to Earth Mesh)
      const latRad = THREE.MathUtils.degToRad(TARGET_LATITUDE);
      const lonRad = THREE.MathUtils.degToRad(TARGET_LONGITUDE);

      // Spherical to Cartesian conversion (Y-up, XZ-plane for Longitude)
      targetPointLocal.x = radius * Math.cos(latRad) * Math.cos(lonRad);
      targetPointLocal.y = radius * Math.sin(latRad);
      targetPointLocal.z = radius * Math.cos(latRad) * Math.sin(lonRad);

      // 2. Define the Laser Direction and Origin
      laserDirectionLocal = targetPointLocal.clone().normalize();
      laserOriginLocal = targetPointLocal.clone();

      // 3. Create the fixed Laser Line
      const lineGeometry = new THREE.BufferGeometry();
      const laserLinePositions = new Float32Array(6);
      lineGeometry.setAttribute('position', new THREE.BufferAttribute(laserLinePositions, 3));
      const lineMaterial = new THREE.LineBasicMaterial({ color: 0x00ff00, linewidth: 3 });
      earthLaserLine = new THREE.Line(lineGeometry, lineMaterial);

      // Set the laser line points
      const laserLength = 10;
      laserLinePositions[0] = laserOriginLocal.x;
      laserLinePositions[1] = laserOriginLocal.y;
      laserLinePositions[2] = laserOriginLocal.z;
      laserLinePositions[3] = laserOriginLocal.x + laserDirectionLocal.x * laserLength;
      laserLinePositions[4] = laserOriginLocal.y + laserDirectionLocal.y * laserLength;
      laserLinePositions[5] = laserOriginLocal.z + laserDirectionLocal.z * laserLength;
      lineGeometry.attributes.position.needsUpdate = true;

      // 4. EDITED: Set Asteroid Geometry based on ASTEROID_RADIUS_KM
      const ASTEROID_VISUAL_RADIUS = ASTEROID_RADIUS_KM * FACTOR;
      const Asteroid1 = new THREE.SphereGeometry(ASTEROID_VISUAL_RADIUS, 64, 64);
      AsteroidMesh = new THREE.Mesh(Asteroid1, material_Aster);

      // 5. Initial Asteroid Position
      const initialDistance = radius + ASTEROID_DISTANCE;
      const initialAsteroidPositionLocal = laserDirectionLocal.clone().multiplyScalar(initialDistance);

      // Create a group for the asteroid
      asteroidGroup = new THREE.Group();
      asteroidGroup.position.copy(initialAsteroidPositionLocal);
      asteroidGroup.add(AsteroidMesh); // Add the mesh we just created

      // Store the asteroid's current distance from the Earth's center
      currentDistance = initialDistance;

      // Store the target collision point for cratering
      craterCenter = targetPointLocal.clone();

      // Add to the Earth Group
      earthGroup.add(earthLaserLine);
      earthGroup.add(asteroidGroup);

      // Initialize camera position to look at the Earth, before the animation takes over
      camera.position.z = 1;
      camera.position.y = 0.5; // Slightly above the plane
      controls.target.set(0, 0, 0);
      controls.update();

    }
    // --- END INIT FUNCTION ---


    // --- Parameter Reading and Initialization ---
    document.addEventListener('DOMContentLoaded', () => {
      // Get the URL search parameters
      const params = new URLSearchParams(window.location.search);

      // Read the data
      const asteroidName = params.get('name');
      const impactSpeed = params.get('speed');
      const AsterRadius = params.get('radius');
      const impactLatitude = params.get('latitude');
      const impactLongitude = params.get('longitude');

      if (asteroidName) {
        // 1. Update Asteroid Name
        ASTEROID_NAME = decodeURIComponent(asteroidName.replace(/_/g, ' '));

        // 2. Update Collision Location
        if (impactLatitude) TARGET_LATITUDE = parseFloat(impactLatitude);
        if (impactLongitude) TARGET_LONGITUDE = parseFloat(impactLongitude);

        // 3. Update Impact Speed
        if (impactSpeed) {
          ASTEROID_IMPACT_SPEED_KM_S = parseFloat(impactSpeed);
          ASTEROID_VISUAL_SPEED = Math.max(0.1, Math.min(ASTEROID_IMPACT_SPEED_KM_S * 0.025, 5.0));
        }
        if (AsterRadius) {
          // 4. Update Asteroid Radius
          ASTEROID_RADIUS_KM = parseFloat(AsterRadius);
        } else {
          // If no radius is passed, use the default and log it
          console.log(`No radius provided. Using default radius: ${ASTEROID_RADIUS_KM} km`);
        }

        console.log(`--- Collision Data Received ---`);
        console.log(`Asteroid name: ${ASTEROID_NAME}`);
        console.log(`Asteroid radius: ${ASTEROID_RADIUS_KM}`);
        console.log(`Impact Speed: ${ASTEROID_IMPACT_SPEED_KM_S} km/s (Visual Speed: ${ASTEROID_VISUAL_SPEED.toFixed(3)})`);
        console.log(`Location: Lat ${TARGET_LATITUDE.toFixed(4)}°, Lon ${TARGET_LONGITUDE.toFixed(4)}°`);
        console.log(`-----------------------------`);
      } else {
        // NOTE: A default visual radius is already set globally (0.5 km)
        console.log("No collision data found in URL parameters. Using default simulation values.");
      }

      // Initialize the simulation with the updated variables
      initAsteroidSimulation();

      // Start the animation loop after initialization
      animate();
    });
    // --- END PARAMETER READING ---


    // --- ANIMATION LOOP ---
    let animationFrameId; // Define here to make it accessible to cancelAnimationFrame (though not used in this file)

    function animate() {
      animationFrameId = requestAnimationFrame(animate); // Request the next frame

      // live update earth orientation from system UTC time
      updateEarthRotation();

      const delta = clock.getDelta();

      // --- NEW ASTEROID MOVEMENT LOGIC ---
      // Check for asteroidGroup to ensure init has run
      if (!hasCollided && asteroidGroup) {
        // 1. Move the asteroid
        // The asteroid moves toward the Earth's center (0,0,0) along the laser direction
        currentDistance -= ASTEROID_VISUAL_SPEED * delta; // Use the dynamic speed

        // Update asteroid position based on its distance from Earth's center
        asteroidGroup.position.copy(laserDirectionLocal).multiplyScalar(currentDistance);


        // 2. *** EDITED: Camera Follow Logic ***
        const asteroidPosition = asteroidGroup.position;

        // Calculate the camera position: along the laser line, behind the asteroid
        // The laserDirectionLocal vector points from Earth center to the asteroid
        // To place the camera *behind* the asteroid, we need a vector pointing *away* from the Earth center, 
        // which is the normalized position vector of the asteroid.
        const directionAwayFromEarth = asteroidPosition.clone().normalize();

        // Target is the asteroid's current position
        controls.target.copy(asteroidPosition);

        // Position the camera behind the asteroid at a fixed distance
        camera.position.copy(directionAwayFromEarth).multiplyScalar(currentDistance + CAMERA_FOLLOW_DISTANCE);

        // Make the camera follow the rotation of the Earth's group 
        // by placing the controls.target and camera position in the Earth Group's local space. 
        // Since the camera is outside the group, we need to convert the asteroid's local position 
        // to world space if the camera was to be moved by world coordinates, but 
        // since the OrbitControls and camera are world objects, we can use the asteroid's local position 
        // within the EarthGroup as the target, and place the camera relative to that.
        // We ensure the camera is following the asteroid in the EarthGroup's frame of reference.
        // *** END EDITED: Camera Follow Logic ***


        // 3. Check for collision
        if (currentDistance <= earthRaduis) {
          hasCollided = true;

          // --- Restore Camera Position to view the impact after collision ---
          // Position the camera to look at the impact site (craterCenter) or Earth center (0,0,0)
          camera.position.z = 1;
          camera.position.y = 0.5;
          controls.target.set(0, 0, 0); // Revert to Earth view
          // -----------------------------------------------------------------

          // Log collision location
          console.log(`COLLISION DETECTED! (${ASTEROID_NAME})`);
          console.log(`Collision Location: Longitude: ${TARGET_LONGITUDE.toFixed(4)}°, Latitude: ${TARGET_LATITUDE.toFixed(4)}°`); // Increased precision for console

          // --- Calculate Kinetic Energy of Asteroid (Full precision) ---
          const density_p = 7960; // Projectile density (kg/m³)
          const density_t = 3000; // Target density (kg/m³)
          const g = 9.81;         // Gravity (m/s²)

          // Asteroid radius (convert simulation radius to real meters)
          const effectiveAsteroidRadiusKm = ASTEROID_RADIUS_KM;
          const radius_m = effectiveAsteroidRadiusKm * 1000; // km → m
          const diameter_m = radius_m * 2;

          // Basic kinetic parameters
          const volume = (4 / 3) * Math.PI * Math.pow(radius_m, 3);
          const mass = density_p * volume;
          const velocity_m_s = ASTEROID_IMPACT_SPEED_KM_S * 1000; // km/s → m/s
          const KE = 0.5 * mass * Math.pow(velocity_m_s, 2);
          const KE_Mt = KE / 4.184e15; // Megatons TNT equivalent

          // --- Transient Cavity Diameter (D_tc) ---
          const D_tc = 1.39 *
            Math.pow(density_p / density_t, 1 / 3) *
            Math.pow(diameter_m, 0.78) *
            Math.pow(velocity_m_s, 0.43) *
            Math.pow(g, -0.22);
          const D_tc_km = D_tc / 1000;

          // --- CONSOLE Output (Keep for debugging) ---
          console.log("===== ASTEROID IMPACT REPORT =====");
          console.log(`Asteroid Radius (m): ${radius_m.toLocaleString('en-US', { maximumFractionDigits: 2 })}`);
          console.log(`Asteroid Diameter (m): ${diameter_m.toLocaleString('en-US', { maximumFractionDigits: 2 })}`);
          console.log(`Asteroid Volume (m³): ${volume.toLocaleString('en-US', { maximumFractionDigits: 2 })}`);
          console.log(`Asteroid Mass (kg): ${mass.toLocaleString('en-US', { maximumFractionDigits: 2 })}`);
          console.log(`Velocity (m/s): ${velocity_m_s.toLocaleString('en-US', { maximumFractionDigits: 2 })}`);
          console.log(`Kinetic Energy (J): ${KE.toExponential(2)}`);
          console.log(`Kinetic Energy (Megatons TNT): ${KE_Mt.toLocaleString('en-US', { maximumFractionDigits: 2 })}`);
          console.log(`Transient Cavity Diameter D_tc (m): ${D_tc.toLocaleString('en-US', { maximumFractionDigits: 2 })}`);
          console.log(`Transient Cavity Diameter D_tc (km): ${D_tc_km.toLocaleString('en-US', { maximumFractionDigits: 2 })}`);
          console.log("===================================");

          // --- NEW: Display Data on HTML Screen ---
          if (reportPanel) {
            reportElements.name.textContent = ASTEROID_NAME;
            reportElements.lat.textContent = TARGET_LATITUDE.toFixed(4) + '°';
            reportElements.lon.textContent = TARGET_LONGITUDE.toFixed(4) + '°';
            reportElements.mass.textContent = `${mass.toLocaleString('en-US', { maximumFractionDigits: 2 })} kg`;
            reportElements.velocity.textContent = `${velocity_m_s.toLocaleString('en-US', { maximumFractionDigits: 2 })} m/s`;
            reportElements.keJ.textContent = `${KE.toExponential(2)}`; // Use scientific notation for large numbers
            reportElements.keMt.textContent = `${KE_Mt.toLocaleString('en-US', { maximumFractionDigits: 2 })}`;
            reportElements.craterKm.textContent = `${D_tc_km.toLocaleString('en-US', { maximumFractionDigits: 2 })} km`;

            reportPanel.style.display = 'block'; // Show the report panel
          }
          // --- END NEW DISPLAY LOGIC ---

          // --- NEW: Add Three Concentric SPHERES at Impact Point (Updated Red Sphere Size) ---

          // Calculate the visual radius for the red sphere using the calculated Crater Diameter (D_tc_km)
          const CRATER_DIAMETER_VISUAL = (D_tc_km * FACTOR) / 2;

          // 1. Red Sphere: Radius = Crater Diameter (in visual units)
          const sphereRadius1 = CRATER_DIAMETER_VISUAL;
          // 2. Green Sphere: Fixed size 0.1
          const sphereRadius2 = 0.1;
          // 3. Blue Sphere: Fixed size 0.3
          const sphereRadius3 = 0.3;

          function createImpactSphere(radius, color) {
            // Using a low-poly sphere for the effect
            const sphereGeometry = new THREE.SphereGeometry(radius, 16, 16);
            const sphereMaterial = new THREE.MeshBasicMaterial({
              color: color,
              transparent: true,
              opacity: 0.5, // Make them semi-transparent
              wireframe: true // Optional: Show as a wireframe sphere
            });
            const sphereMesh = new THREE.Mesh(sphereGeometry, sphereMaterial);

            // Position the sphere at the impact center (craterCenter).
            sphereMesh.position.copy(craterCenter);

            // To ensure the spheres are visible and sit "on top" of the Earth, 
            // we move them slightly outwards along the normal vector.
            const normal = craterCenter.clone().normalize();
            const offset = 0.001; // Small offset above the Earth surface
            sphereMesh.position.add(normal.multiplyScalar(offset));

            return sphereMesh;
          }

          const sphere1 = createImpactSphere(sphereRadius1, 0xff0000); // Red (Crater Diameter size)
          const sphere2 = createImpactSphere(sphereRadius2, 0x00ff00); // Green
          const sphere3 = createImpactSphere(sphereRadius3, 0x0000ff); // Blue

          earthGroup.add(sphere1);
          earthGroup.add(sphere2);
          earthGroup.add(sphere3);
          // --- END NEW SPHERE LOGIC ---

          // Add crater at the target location
          // addCrater(geometry, craterCenter, 0.3, 0.2); // Removed as requested

          // Remove asteroid mesh and laser line
          asteroidGroup.remove(AsteroidMesh);
          earthGroup.remove(earthLaserLine);
        }


      }
      // --- END NEW ASTEROID MOVEMENT LOGIC ---

      controls.update();
      renderer.render(scene, camera);
    }

    // NOTE: The initial call to animate() is now inside the DOMContentLoaded block.

    // --- Handle Resizing ---
    window.addEventListener('resize', onWindowResize, false);
    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
  </script>
</body>
